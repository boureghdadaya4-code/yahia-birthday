<html/>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Yahia</title>
    <style>
        body {
            margin: 0; background-color: #e0f2f1; /* الأزرق الفاتح الذي اخترناه */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; font-family: 'Arial', sans-serif; overflow: hidden;
        }

        /* شاشة البداية */
        #entry-screen { text-align: center; z-index: 10; }
        .open-btn { 
            padding: 15px 30px; font-size: 18px; cursor: pointer; 
            background: #006064; color: white; border: none; border-radius: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s;
        }

        /* حاوية العرض */
        #main-display { display: none; text-align: center; width: 90%; max-width: 400px; }
        
        .photo-frame {
            background: white; padding: 10px; border-radius: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px;
            animation: fadeIn 1.5s ease-in-out;
        }
        .photo-frame img { width: 100%; border-radius: 3px; }

        .message { font-size: 20px; color: #004d40; line-height: 1.5; margin: 20px; min-height: 60px; }

        #cake-section { display: none; animation: fadeIn 2s; }
        .cake { font-size: 80px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="entry-screen">
        <h1>Hi Yahia! ✨</h1>
        <p>Do you want to open your surprise?</p>
        <button class="open-btn" onclick="startApp()">Open it! ✨</button>
        <button class="open-btn" style="background:#ccc;" onclick="sayNo()">No</button>
    </div>

    <div id="main-display">
        <div id="content-area">
            <div class="photo-frame">
                <img id="current-img" src="https://i.ibb.co/HDPXCxNZ/photo-2026-03-14-12-49-57-yahia4.jpg">
            </div>
            <p class="message" id="current-msg">Today is a special day because it's your birthday...</p>
            <button id="next-btn" class="open-btn" onclick="nextStep()">Next →</button>
        </div>

        <div id="cake-section">
            <p>Make a wish, Yahia...</p>
            <div class="cake" onclick="blow()">🕯️</div>
            <p id="final-wish" style="display:none; font-weight:bold; margin-top:20px;">Happy Birthday! ✨🎂</p>
        </div>
    </div>

    <audio id="music" loop>
        <source src="https://www.mboxdrive.com/happy-birthday-piano.mp3" type="audio/mpeg">
    </audio>

    <script>
        let step = 0;
        const images = [
            "https://i.ibb.co/dwSfP0zg/photo-2026-03-14-12-50-01-yahia2.jpg",
            "https://i.ibb.co/TxPCmKx5/photo-2026-03-14-12-50-08-yahia-1.jpg"
        ];
        const messages = [
            "You are an amazing person, and you deserve the best year ever.",
            "I hope all your dreams and wishes come true!"
        ];

        function sayNo() {
            let again = confirm("Awh... 🥺 Please, you will like it! Try again?");
            if(again) startApp();
        }

        function startApp() {
            document.getElementById('music').play();
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('main-display').style.display = 'block';
        }

        function nextStep() {
            if (step < images.length) {
                document.getElementById('current-img').src = images[step];
                document.getElementById('current-msg').innerText = messages[step];
                step++;
            } else {
                document.getElementById('content-area').style.display = 'none';
                document.getElementById('cake-section').style.display = 'block';
            }
        }

        function blow() {
            document.querySelector('.cake').innerHTML = "🍰";
            document.getElementById('final-wish').style.display = 'block';
        }
    </script>
</body>
</html>
