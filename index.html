<html/>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For Yahia 🎂</title>
    <style>
        body { 
            background-color: #fdf5e6; 
            display: flex; flex-direction: column; align-items: center; 
            font-family: 'Comic Sans MS', cursive; padding: 20px;
        }
        .photo-frame { 
            background: white; padding: 10px; box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            transform: rotate(-3deg); margin: 20px; transition: 0.3s;
        }
        .photo-frame:nth-child(2) { transform: rotate(3deg); }
        .photo-frame img { width: 250px; display: block; }

        .cake { font-size: 100px; cursor: pointer; margin: 30px; transition: 0.3s; }
        .cake:hover { transform: scale(1.1); }
        
        #hidden-content { display: none; text-align: center; }
        .msg { font-size: 24px; color: #8b4513; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Happy Birthday Yahia! 🎂</h1>
    <p>Look at these memories... click the candle!</p>

    <div class="photo-frame"><img src="https://i.ibb.co/HDPXCxNZ/photo-2026-03-14-12-49-57-yahia4.jpg"></div>
    <div class="photo-frame"><img src="https://i.ibb.co/dwSfP0zg/photo-2026-03-14-12-50-01-yahia2.jpg"></div>

    <div class="cake" onclick="reveal()">🎂🕯️</div>

    <audio id="birthdaySong" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <div id="hidden-content">
        <p class="msg">"Happy Birthday Yahia! You make every day special."</p>
    </div>

    <script>
        function reveal() {
            // تشغيل الموسيقى
            let song = document.getElementById('birthdaySong');
            song.play();
            
            document.getElementById('hidden-content').style.display = 'block';
            document.querySelector('.cake').innerHTML = '🍰';
        }
    </script>
</body>
</html>
